name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: version
        run: echo "value=${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build macOS arm64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.value }}" -o thg .
          tar -czf thg-darwin-arm64.tar.gz thg
          rm thg

      - name: Build macOS amd64
        env:
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.value }}" -o thg .
          tar -czf thg-darwin-amd64.tar.gz thg
          rm thg

      - name: Create checksums
        run: shasum -a 256 thg-darwin-*.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          generate_release_notes: true
          overwrite: true
          files: |
            thg-darwin-arm64.tar.gz
            thg-darwin-amd64.tar.gz
            checksums.txt
