name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build macOS arm64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o thg-darwin-arm64 .

      - name: Build macOS amd64
        env:
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o thg-darwin-amd64 .

      - name: Create checksums
        run: shasum -a 256 thg-darwin-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            thg-darwin-arm64
            thg-darwin-amd64
            checksums.txt
